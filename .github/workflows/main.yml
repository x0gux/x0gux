name: GitHub-Profile-3D-Contrib

on:
  schedule:
    # 한국 시간 기준 새벽 3시 (UTC 18:00)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-github-profile-3d-contrib
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: x0gux

      - name: Commit & Push
        run: |
          git config user.name "x0gux"
          git config user.email "kimtaehyun081117@gmail.com"
          git remote set-url origin https://github.com/x0gux/x0gux.git
          git add -A .
          git commit -m "generated" || echo "No changes to commit"
          git push
